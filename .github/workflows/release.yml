name: Release

on:
  push:
    tags:
      - 'release/*'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore MeisterProPR.slnx

      - name: Build
        run: dotnet build MeisterProPR.slnx --no-restore --configuration Release

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore MeisterProPR.slnx

      - name: Run domain tests
        run: dotnet test tests/MeisterProPR.Domain.Tests/MeisterProPR.Domain.Tests.csproj --no-restore --configuration Release --verbosity normal

      - name: Run application tests
        run: dotnet test tests/MeisterProPR.Application.Tests/MeisterProPR.Application.Tests.csproj --no-restore --configuration Release --verbosity normal

      - name: Run infrastructure tests
        run: dotnet test tests/MeisterProPR.Infrastructure.Tests/MeisterProPR.Infrastructure.Tests.csproj --no-restore --configuration Release --verbosity normal

      - name: Run API tests
        run: dotnet test tests/MeisterProPR.Api.Tests/MeisterProPR.Api.Tests.csproj --no-restore --configuration Release --verbosity normal

      - name: Run ProCursor service tests
        run: dotnet test tests/MeisterProPR.ProCursor.Service.Tests/MeisterProPR.ProCursor.Service.Tests.csproj --no-restore --configuration Release --verbosity normal

  release:
    name: Build, push, and sign images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Parse version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/release/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Stable: exactly N.N.N — anything else (alpha, beta, rc …) is pre-release
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set image names (lowercase)
        id: images
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=${{ env.REGISTRY }}/${REPO}" >> "$GITHUB_OUTPUT"
          echo "procursor=${{ env.REGISTRY }}/${REPO}/procursor" >> "$GITHUB_OUTPUT"
          echo "frontend=${{ env.REGISTRY }}/${REPO}/frontend" >> "$GITHUB_OUTPUT"

      - name: Compute Docker tags
        id: tags
        run: |
          BACKEND="${{ steps.images.outputs.backend }}"
          PROCURSOR="${{ steps.images.outputs.procursor }}"
          FRONTEND="${{ steps.images.outputs.frontend }}"
          VERSION="${{ steps.version.outputs.version }}"

          if [ "${{ steps.version.outputs.is_prerelease }}" = "true" ]; then
            # Pre-release: version tag only — do not move latest
            {
              echo "backend<<ENDOFTAGS"
              echo "${BACKEND}:${VERSION}"
              echo "ENDOFTAGS"
              echo "procursor<<ENDOFTAGS"
              echo "${PROCURSOR}:${VERSION}"
              echo "ENDOFTAGS"
              echo "frontend<<ENDOFTAGS"
              echo "${FRONTEND}:${VERSION}"
              echo "ENDOFTAGS"
            } >> "$GITHUB_OUTPUT"
          else
            # Stable release: version tag + latest
            {
              echo "backend<<ENDOFTAGS"
              echo "${BACKEND}:${VERSION}"
              echo "${BACKEND}:latest"
              echo "ENDOFTAGS"
              echo "procursor<<ENDOFTAGS"
              echo "${PROCURSOR}:${VERSION}"
              echo "${PROCURSOR}:latest"
              echo "ENDOFTAGS"
              echo "frontend<<ENDOFTAGS"
              echo "${FRONTEND}:${VERSION}"
              echo "${FRONTEND}:latest"
              echo "ENDOFTAGS"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend image

      - name: Build and push backend image
        id: build-backend
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          push: true
          pull: true
          tags: ${{ steps.tags.outputs.backend }}
          labels: |
            org.opencontainers.image.title=Meister DEV ProPR
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest backend image
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ steps.images.outputs.backend }}
          subject-digest: ${{ steps.build-backend.outputs.digest }}
          push-to-registry: true

      - name: Scan backend image
        uses: anchore/scan-action@v7.4.0
        id: scan-backend
        with:
          image: ${{ steps.images.outputs.backend }}@${{ steps.build-backend.outputs.digest }}
          fail-build: false
          output-format: sarif

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan-backend.outputs.sarif }}
          category: backend-image

      # ProCursor image

      - name: Build and push ProCursor image
        id: build-procursor
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: procursor.dockerfile
          push: true
          pull: true
          tags: ${{ steps.tags.outputs.procursor }}
          labels: |
            org.opencontainers.image.title=Meister DEV ProPR ProCursor
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest ProCursor image
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ steps.images.outputs.procursor }}
          subject-digest: ${{ steps.build-procursor.outputs.digest }}
          push-to-registry: true

      - name: Scan ProCursor image
        uses: anchore/scan-action@v7.4.0
        id: scan-procursor
        with:
          image: ${{ steps.images.outputs.procursor }}@${{ steps.build-procursor.outputs.digest }}
          fail-build: false
          output-format: sarif

      - name: Upload ProCursor scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan-procursor.outputs.sarif }}
          category: procursor-image

      # Frontend image

      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          pull: true
          tags: ${{ steps.tags.outputs.frontend }}
          labels: |
            org.opencontainers.image.title=Meister DEV ProPR Management Interface
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest frontend image
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ steps.images.outputs.frontend }}
          subject-digest: ${{ steps.build-frontend.outputs.digest }}
          push-to-registry: true

      - name: Scan frontend image
        uses: anchore/scan-action@v7.4.0
        id: scan-frontend
        with:
          image: ${{ steps.images.outputs.frontend }}@${{ steps.build-frontend.outputs.digest }}
          fail-build: false
          output-format: sarif

      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan-frontend.outputs.sarif }}
          category: frontend-image
