name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [ format, build ]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore --configuration Release --verbosity normal

  admin-ui-tests:
    name: Admin UI tests
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install admin-ui dependencies
        run: npm ci
        working-directory: admin-ui

      - name: Type check admin-ui
        run: npm run type-check
        working-directory: admin-ui

      - name: Run admin-ui unit tests
        run: npm test
        working-directory: admin-ui

  build-backend-image:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build backend image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: Dockerfile
          push: false
          tags: meisterpropr:ci-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend-image:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: [ test, admin-ui-tests ]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build frontend image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: admin-ui/Dockerfile
          push: false
          tags: meisterpropr-admin-ui:ci-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
