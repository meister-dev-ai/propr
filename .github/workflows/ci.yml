name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v6.0.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore MeisterProPR.slnx

      - name: Install JetBrains cleanupcode
        run: dotnet tool install --global JetBrains.ReSharper.GlobalTools

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Build solution for cleanupcode
        run: dotnet build MeisterProPR.slnx --no-restore --configuration Release

      - name: Run cleanupcode
        run: |
          jb cleanupcode MeisterProPR.slnx --profile="Built-in: Reformat Code" --verbosity=INFO --no-updates

      - name: Verify formatting
        run: git diff --exit-code

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v6.0.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore MeisterProPR.slnx

      - name: Build
        run: dotnet build MeisterProPR.slnx --no-restore --configuration Release

  architecture-gates:
    name: Architecture Gates
    runs-on: ubuntu-latest
    needs: [ format, build ]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v6.0.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore MeisterProPR.slnx

      - name: Run architecture dependency tests
        run: dotnet test tests/MeisterProPR.Application.Tests/MeisterProPR.Application.Tests.csproj --no-restore --configuration Release --filter "VerticalSliceDependencyTests"

      - name: Run startup registration safety tests
        run: dotnet test tests/MeisterProPR.Api.Tests/MeisterProPR.Api.Tests.csproj --no-restore --configuration Release --filter "ModuleRegistrationTests|WaveRegistrationSafetyTests"

  reviewing-slice-gates:
    name: Reviewing Slice Gates
    runs-on: ubuntu-latest
    needs: [ architecture-gates ]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v6.0.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore MeisterProPR.slnx

      - name: Run Reviewing application slice tests
        run: dotnet test tests/MeisterProPR.Application.Tests/MeisterProPR.Application.Tests.csproj --no-restore --configuration Release --filter "ReviewingModuleTests|SubmitReviewJobHandlerTests|GetReviewJobStatusHandlerTests"

      - name: Run Reviewing API slice tests
        run: dotnet test tests/MeisterProPR.Api.Tests/MeisterProPR.Api.Tests.csproj --no-restore --configuration Release --filter "ReviewingModuleIntegrationTests|ReviewJobsControllerTests|ReviewJobIntakeIntegrationTests|JobsControllerProtocolTests|ReviewJobWorkerTests"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [ architecture-gates, reviewing-slice-gates ]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v6.0.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore MeisterProPR.slnx

      - name: Run domain tests
        run: dotnet test tests/MeisterProPR.Domain.Tests/MeisterProPR.Domain.Tests.csproj --no-restore --configuration Release --verbosity normal

      - name: Run application tests
        run: dotnet test tests/MeisterProPR.Application.Tests/MeisterProPR.Application.Tests.csproj --no-restore --configuration Release --verbosity normal

      - name: Run infrastructure tests
        run: dotnet test tests/MeisterProPR.Infrastructure.Tests/MeisterProPR.Infrastructure.Tests.csproj --no-restore --configuration Release --verbosity normal

      - name: Run API tests
        run: dotnet test tests/MeisterProPR.Api.Tests/MeisterProPR.Api.Tests.csproj --no-restore --configuration Release --verbosity normal

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check frontend
        run: npm run type-check
        working-directory: frontend

      - name: Run frontend unit tests
        run: npm test
        working-directory: frontend

  build-backend-image:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Build backend image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          pull: true
          tags: meisterpropr:ci-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image
        uses: anchore/scan-action@v7.4.0
        id: scan-backend
        with:
          image: meisterpropr:ci-${{ github.run_number }}
          fail-build: false
          output-format: sarif

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan-backend.outputs.sarif }}
          category: backend-image

  build-frontend-image:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: [ test, frontend-tests ]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Build frontend image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          pull: true
          tags: meisterpropr-frontend:ci-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan frontend image
        uses: anchore/scan-action@v7.4.0
        id: scan-frontend
        with:
          image: meisterpropr-frontend:ci-${{ github.run_number }}
          fail-build: false
          output-format: sarif

      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan-frontend.outputs.sarif }}
          category: frontend-image
