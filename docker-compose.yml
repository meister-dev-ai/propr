services:
  loki:
    image: grafana/loki:3.4.1
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready | grep -q 'ready'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - loki_data:/loki

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: meisterpropr
      POSTGRES_USER: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d meisterpropr" ]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  admin-ui:
    build:
      context: .
      dockerfile: admin-ui/Dockerfile
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1/healthz" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    command:
      - sh
      - -c
      - "apk add --no-cache openssl && mkdir -p /etc/nginx/certs && [ -f /etc/nginx/certs/server.crt ] || openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout /etc/nginx/certs/server.key -out /etc/nginx/certs/server.crt -subj '/CN=localhost' && nginx -g 'daemon off;'"
    ports:
      - "5443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      meisterpropr:
        condition: service_healthy
      admin-ui:
        condition: service_healthy
      grafana:
        condition: service_started

  meisterpropr:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_healthy
    environment:
      - MEISTER_CLIENT_KEYS=${MEISTER_CLIENT_KEYS:-}
      - MEISTER_ADMIN_KEY=${MEISTER_ADMIN_KEY:-}
      - MEISTER_JWT_SECRET=${MEISTER_JWT_SECRET}
      - MEISTER_BOOTSTRAP_ADMIN_USER=${MEISTER_BOOTSTRAP_ADMIN_USER}
      - MEISTER_BOOTSTRAP_ADMIN_PASSWORD=${MEISTER_BOOTSTRAP_ADMIN_PASSWORD}
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING:-Host=postgres;Port=5432;Database=meisterpropr;Username=postgres;Password=devpass}
      - AI_ENDPOINT=${AI_ENDPOINT}
      - AI_DEPLOYMENT=${AI_DEPLOYMENT}
      - AI_API_KEY=${AI_API_KEY:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - AI_MAX_ITERATIONS_LOW=${AI_MAX_ITERATIONS_LOW:-}
      - AI_MAX_ITERATIONS_MEDIUM=${AI_MAX_ITERATIONS_MEDIUM:-}
      - AI_MAX_ITERATIONS_HIGH=${AI_MAX_ITERATIONS_HIGH:-}
      # IMP-05: confidence-floor severity downgrade thresholds (defaults: 80 / 60)
      - AI_CONFIDENCE_FLOOR_ERROR=${AI_CONFIDENCE_FLOOR_ERROR:-}
      - AI_CONFIDENCE_FLOOR_WARNING=${AI_CONFIDENCE_FLOOR_WARNING:-}
      # IMP-08: minimum comment count that triggers the cross-file quality-filter AI pass (default: 20)
      - AI_QUALITY_FILTER_THRESHOLD=${AI_QUALITY_FILTER_THRESHOLD:-}
      - LOKI_URL=http://loki:3100
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  nginx_certs:
  loki_data:
  grafana_data:
