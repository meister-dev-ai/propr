server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    absolute_redirect off;

    # Redirect plain HTTP requests that arrive on this HTTPS port
    error_page 497 https://$http_host$request_uri;

    # Suppress browser favicon requests before they fall through to the backend API.
    location = /favicon.ico {
        return 204;
        access_log off;
    }

    # Backward-compatible redirect for old /admin bookmarks.
    location = /admin {
        return 308 /;
    }

    location ^~ /admin/ {
        rewrite ^/admin/(.*)$ /$1 permanent;
    }

    location = /api {
        return 308 /api/;
    }

    # Public API surface. The /api prefix exists only at the nginx layer.
    location ^~ /api/ {
        proxy_pass         http://meisterpropr:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Public webhook ingress routes directly to the backend without the /api prefix.
    location ^~ /webhooks/ {
        proxy_pass         http://meisterpropr:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ^~ /grafana/ {
        proxy_pass         http://grafana:3000;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Admin UI SPA — serves static assets and the index.html fallback from root.
    location / {
        proxy_pass         http://admin-ui:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
